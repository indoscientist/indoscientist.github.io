<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Indoscientist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">IS</span><span>Indoscientist</span></a><button class="nav-toggle" id="navToggle">☰</button><nav class="site-nav" id="siteNav"><a href="index.html">Beranda</a><a href="materi.html">Materi</a><a href="bank-soal.html">Bank Soal</a><a href="artikel.html">Artikel</a><a href="kontak.html">Kontak</a><a href="admin.html" class="active">Admin</a><button class="theme-toggle" id="themeToggle" type="button">🌙</button></nav></header>
  <main>
    <section class="page-hero section reveal"><p class="eyebrow">Dashboard Admin</p><h1>Tambah Konten Indoscientist</h1><p>Login dengan email admin Supabase, lalu tambahkan materi, bank soal, atau artikel.</p></section>

    <section class="section compact admin-layout">
      <form class="admin-card reveal" id="loginForm">
        <h2>Login Admin</h2>
        <label>Email</label><input type="email" id="email" placeholder="email@contoh.com" required>
        <label>Password</label><input type="password" id="password" placeholder="Password Supabase" required>
        <button class="btn btn-primary" type="submit">Login</button>
        <button class="btn btn-ghost" type="button" id="logoutBtn">Logout</button>
        <p id="authStatus" class="form-status"></p>
      </form>

      <form class="admin-card reveal" id="contentForm">
        <h2>Tambah Konten</h2>
        <label>Jenis Konten</label>
        <select id="tableName" required>
          <option value="materi">Materi</option>
          <option value="bank_soal">Bank Soal</option>
          <option value="artikel">Artikel</option>
        </select>
        <label>Judul</label><input type="text" id="judul" placeholder="Contoh: Fungsi Kuadrat" required>
        <label>Mapel/Kategori</label>
        <select id="mapel" required>
          <option value="matematika">Matematika</option>
          <option value="fisika">Fisika</option>
          <option value="kimia">Kimia</option>
          <option value="biologi">Biologi</option>
          <option value="pendidikan">Pendidikan</option>
          <option value="teknologi">Teknologi</option>
        </select>
        <label>Kelas</label><input type="text" id="kelas" placeholder="X / XI / XII">
        <label>Deskripsi/Ringkasan</label><textarea id="deskripsi" rows="4" placeholder="Tulis ringkasan singkat..."></textarea>
        <label>Link File/Artikel</label><input type="url" id="linkFile" placeholder="https://...">
        <button class="btn btn-primary" type="submit">Simpan Konten</button>
        <p id="contentStatus" class="form-status"></p>
      </form>
    </section>
  </main>
  <footer class="site-footer"><p>© 2026 Indoscientist.</p></footer>
  <script src="js/app.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
